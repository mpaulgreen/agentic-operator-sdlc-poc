apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: postgres-operator
    app.kubernetes.io/managed-by: kustomize
  name: postgrescluster-editor-role
rules:
- apiGroups:
  - database.postgres.example.com
  resources:
  - postgresclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - database.postgres.example.com
  resources:
  - postgresclusters/status
  verbs:
  - get
