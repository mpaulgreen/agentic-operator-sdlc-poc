apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "search.elasticsearch.example.com/v1beta1",
          "kind": "ElasticsearchCluster",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "elasticsearch-operator"
            },
            "name": "elasticsearchcluster-sample"
          },
          "spec": {
            "replicas": 3,
            "version": "8.14",
            "storage": {
              "size": "10Gi"
            },
            "backup": {
              "enabled": true,
              "schedule": "0 2 * * *"
            }
          }
        }
      ]
    capabilities: Basic Install
    categories: Database
    certified: "false"
    createdAt: "2026-05-14T00:00:00Z"
    operators.operatorframework.io/builder: operator-sdk-v1.37.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/example/elasticsearch-operator
  name: elasticsearch-operator.v0.4.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: ElasticsearchCluster is the Schema for the elasticsearchclusters API
      displayName: Elasticsearch Cluster
      kind: ElasticsearchCluster
      name: elasticsearchclusters.search.elasticsearch.example.com
      version: v1beta1
      resources:
      - kind: StatefulSet
        version: v1
      - kind: Service
        version: v1
      - kind: Secret
        version: v1
      - kind: ConfigMap
        version: v1
      - kind: CronJob
        version: v1
      - kind: Deployment
        version: v1
      - kind: NetworkPolicy
        version: v1
      specDescriptors:
      - path: replicas
        displayName: Replicas
        description: Number of Elasticsearch data nodes
      - path: version
        displayName: Version
        description: Elasticsearch version to deploy
      - path: storage
        displayName: Storage
        description: Persistent storage configuration
      - path: resources
        displayName: Resources
        description: CPU and memory resource requirements
      - path: auth
        displayName: Auth
        description: Optional authentication configuration
      - path: backup
        displayName: Backup
        description: Optional snapshot backup configuration
      - path: backup.enabled
        displayName: Backup Enabled
        description: Whether backup is active
      - path: backup.retentionDays
        displayName: Retention Days
        description: Number of days to retain snapshots
      - path: master
        displayName: Master
        description: Dedicated master node configuration
      - path: master.enabled
        displayName: Master Enabled
        description: Whether dedicated master nodes are active
      - path: master.replicas
        displayName: Master Replicas
        description: Number of master nodes
      - path: ilm
        displayName: ILM
        description: Index Lifecycle Management configuration
      - path: ilm.enabled
        displayName: ILM Enabled
        description: Whether ILM is active
      - path: ilm.hotPhase
        displayName: Hot Phase
        description: Duration for the hot phase
      - path: ilm.warmPhase
        displayName: Warm Phase
        description: Duration for the warm phase
      - path: ilm.deletePhase
        displayName: Delete Phase
        description: Duration for the delete phase
      - path: maxShards
        displayName: Max Shards
        description: Maximum shards per node setting
      statusDescriptors:
      - path: phase
        displayName: Phase
        description: Current lifecycle phase of the ElasticsearchCluster
      - path: readyReplicas
        displayName: Ready Replicas
        description: Number of Elasticsearch nodes that are ready
      - path: currentVersion
        displayName: Current Version
        description: Currently running Elasticsearch version
      - path: httpEndpoint
        displayName: HTTP Endpoint
        description: HTTP service connection endpoint for the Elasticsearch cluster
      - path: ilmEnabled
        displayName: ILM Enabled
        description: Whether ILM is currently active
      - path: conditions
        displayName: Conditions
        description: Latest available observations of the resource state
  description: |
    ## Overview
    The Elasticsearch Operator manages ElasticsearchCluster resources on OpenShift.
    It automates deployment, scaling, and lifecycle management of
    Elasticsearch clusters using StatefulSets, Services, Secrets,
    ConfigMaps, and backup CronJobs.

    ## Features
    - Automated Elasticsearch cluster provisioning with StatefulSets
    - HTTP and transport service management
    - Authentication secret management
    - Elasticsearch configuration via ConfigMaps
    - Scheduled snapshot backups via CronJobs
    - Status tracking with conditions
  displayName: Elasticsearch Operator
  icon:
  - base64data: ""
    mediatype: "image/svg+xml"
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - search.elasticsearch.example.com
          resources:
          - elasticsearchclusters
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - search.elasticsearch.example.com
          resources:
          - elasticsearchclusters/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - search.elasticsearch.example.com
          resources:
          - elasticsearchclusters/finalizers
          verbs:
          - update
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - services
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - statefulsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - batch
          resources:
          - cronjobs
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - networking.k8s.io
          resources:
          - networkpolicies
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        serviceAccountName: elasticsearch-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: elasticsearch-operator
          control-plane: controller-manager
        name: elasticsearch-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=:8443
                - --metrics-secure=true
                - --leader-elect
                command:
                - /manager
                image: quay.io/mpaulgreen/elasticsearch-operator:v0.4.0
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              serviceAccountName: elasticsearch-operator-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: elasticsearch-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  webhookdefinitions:
  - admissionReviewVersions:
    - v1
    containerPort: 9443
    deploymentName: elasticsearch-operator-controller-manager
    failurePolicy: Fail
    generateName: melasticsearchclusterv1beta1.kb.io
    rules:
    - apiGroups:
      - search.elasticsearch.example.com
      apiVersions:
      - v1beta1
      operations:
      - CREATE
      - UPDATE
      resources:
      - elasticsearchclusters
    sideEffects: None
    targetPort: 9443
    type: MutatingAdmissionWebhook
    webhookPath: /mutate-search-elasticsearch-example-com-v1beta1-elasticsearchcluster
  - admissionReviewVersions:
    - v1
    containerPort: 9443
    deploymentName: elasticsearch-operator-controller-manager
    failurePolicy: Fail
    generateName: velasticsearchclusterv1beta1.kb.io
    rules:
    - apiGroups:
      - search.elasticsearch.example.com
      apiVersions:
      - v1beta1
      operations:
      - CREATE
      - UPDATE
      resources:
      - elasticsearchclusters
    sideEffects: None
    targetPort: 9443
    type: ValidatingAdmissionWebhook
    webhookPath: /validate-search-elasticsearch-example-com-v1beta1-elasticsearchcluster
  keywords:
  - elasticsearch
  - search
  - analytics
  links:
  - name: Documentation
    url: https://github.com/example/elasticsearch-operator
  - name: Source Code
    url: https://github.com/example/elasticsearch-operator
  maintainers:
  - email: maintainer@example.com
    name: Maintainer
  maturity: beta
  minKubeVersion: "1.25.0"
  provider:
    name: Example
    url: https://example.com
  replaces: elasticsearch-operator.v0.3.0
  version: 0.4.0
