---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-search-elasticsearch-example-com-v1beta1-elasticsearchcluster
  failurePolicy: Fail
  name: melasticsearchclusterv1beta1.kb.io
  rules:
  - apiGroups:
    - search.elasticsearch.example.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - elasticsearchclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-search-elasticsearch-example-com-v1beta1-elasticsearchcluster
  failurePolicy: Fail
  name: velasticsearchclusterv1beta1.kb.io
  rules:
  - apiGroups:
    - search.elasticsearch.example.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - elasticsearchclusters
  sideEffects: None
